server:
  port: 4001
  servlet:
    context-path: /api

spring:
  application:
    name: ruobing-codebook
  profiles:
    active: dev

# MyBatis-Plus 公共配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ruobing.codebook.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 公共配置
jwt:
  secret: ruobing-codebook-secret-key-2024
  expiration: 86400000

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.ruobing.codebook.controller
  default-flat-param-object: true
