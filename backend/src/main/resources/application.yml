server:
  port: 4001
  servlet:
    context-path: /api

spring:
  application:
    name: ruobing-codebook
  profiles:
    active: dev

# MyBatis-Plus 公共配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ruobing.codebook.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 公共配置
jwt:
  secret: ruobing-codebook-secret-key-2024
  expiration: 86400000

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
