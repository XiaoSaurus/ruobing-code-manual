# 开发环境配置
server:
  port: 4001

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ruobing_codebook?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# 微信小程序登录（jscode2session）。也可用环境变量覆盖：WXAPP_APPID、WXAPP_SECRET
wxapp:
  appid: ${WXAPP_APPID:wx5282bd68a559448f}
  secret: ${WXAPP_SECRET:df8d6f8a4f0c9b3ebcf695e95ba8d217}

# 开发环境：任意手机号可用该验证码登录（生产勿配置 user.sms.dev-bypass-code）
user:
  sms:
    dev-bypass-code: "123456"

# 微信开放平台「网站应用」（与小程序 wxapp 不同）；本地调试扫码需公网回调或使用内网穿透
# wxweb:
#   appid: ${WXWEB_APPID:}
#   secret: ${WXWEB_SECRET:}
#   redirect-uri: http://localhost:4001/api/auth/wechat/callback
# frontend.oauth-return-base 已在 application.yml 默认 http://localhost:3000

# 开发环境开启SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.ruobing.codebook: debug
